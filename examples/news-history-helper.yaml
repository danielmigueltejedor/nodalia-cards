# Shared article history for Nodalia News Card (all dashboards / devices).
# Home Assistant stores the JSON in this helper; each browser reads/writes the same state.
#
# Note: input_text values are limited to 255 characters. The card uses a compact JSON
# format and may keep fewer headlines than max_items when syncing to the helper.

input_text:
  nodalia_news_history_dashboard:
    name: Nodalia news history — dashboard
    max: 255
    initial: "[]"

