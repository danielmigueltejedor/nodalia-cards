# Automation example for Calendar Card `native_event_webhook`.
#
# Use webhook_id `nodalia_calendar_create_event` in the card editor.
#
# Security:
# - Set `security.allow_webhooks_for_non_admin: true` only if non-admin household
#   members must create events from the card (default is admin-only).
# - Restrict `entity_id` to the same calendars configured on the card YAML.
#   The webhook body includes `allowed_calendar_ids` for convenience.
#
# Important:
# Do not map unused calendar fields to empty strings.
# Home Assistant treats empty date fields as present and may reject timed events.

alias: "Nodalia Calendar | Create native event"
mode: single

triggers:
  - trigger: webhook
    webhook_id: nodalia_calendar_create_event
    allowed_methods:
      - POST
    local_only: true

actions:
  - variables:
      d: "{{ trigger.json.service_data | default(trigger.json.data, true) }}"
      allowed: "{{ trigger.json.allowed_calendar_ids | default([], true) }}"

  - condition: template
    value_template: >
      {{ d.entity_id is string and d.entity_id in allowed }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.json.event_kind == 'all_day' }}"
        sequence:
          - action: calendar.create_event
            target:
              entity_id: "{{ d.entity_id }}"
            data:
              summary: "{{ d.summary }}"
              start_date: "{{ d.start_date }}"
              end_date: "{{ d.end_date }}"
              description: "{{ d.description | default(omit, true) }}"
              location: "{{ d.location | default(omit, true) }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger.json.event_kind == 'timed' }}"
        sequence:
          - action: calendar.create_event
            target:
              entity_id: "{{ d.entity_id }}"
            data:
              summary: "{{ d.summary }}"
              start_date_time: "{{ d.start_date_time }}"
              end_date_time: "{{ d.end_date_time }}"
              description: "{{ d.description | default(omit, true) }}"
              location: "{{ d.location | default(omit, true) }}"
