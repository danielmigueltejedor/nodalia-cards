type: custom:nodalia-power-flow-card
title: Energy

entities:
  grid:
    entity: sensor.grid_power
    name: Grid

  home:
    entity: sensor.home_power
    name: Home

  solar:
    entity: sensor.solar_power
    name: Solar

  battery:
    entity: sensor.battery_power
    name: Battery

  individual:
    - entity: sensor.smart_plug_power
      name: Living Room Plug
      icon: mdi:power-plug
      color: "#42a5f5"
    - entity: sensor.office_plug_power
      name: Office Plug
      icon: mdi:desk
      color: "#7fd0c8"

# Optional day/month energy totals (kWh) shown as header chips
consumption_chips:
  day_entity: sensor.home_energy_today
  month_entity: sensor.home_energy_month
  day_label: Today
  month_label: Month

# Tap Home to open the left-to-right device breakdown popup
show_home_device_popup: true

display_zero_lines:
  mode: show
  transparency: 50
  grey_color:
    - 189
    - 189
    - 189

dashboard_link: /energy/overview
