name: Close stale feedback issues

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale-feedback:
    runs-on: ubuntu-latest

    steps:
      - name: Close issues waiting feedback for 7 days
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const days = 7;
            const cutoff = new Date(Date.now() - days * 24 * 60 * 60 * 1000);

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "status: waiting feedback",
              per_page: 100
            });

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const updated = new Date(issue.updated_at);
              if (updated > cutoff) continue;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  "Closing this issue because it has been waiting for feedback for 7 days.",
                  "",
                  "If the problem still exists or you have more information, feel free to reopen it or create a new issue."
                ].join("\\n")
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "not_planned"
              });
            }
