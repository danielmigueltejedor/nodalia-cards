name: 🐛 Bug report
description: Report a problem with Nodalia Cards
title: "[Bug]: "
labels: ["type: bug", "status: needs triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug 🙌  
        Please fill out the information below to help me reproduce the issue.

  - type: dropdown
    id: affected_card
    attributes:
      label: Affected card / area
      options:
        - Navigation Bar
        - Media Player
        - Light Card
        - Fan Card
        - Humidifier Card
        - Circular Gauge Card
        - Graph Card
        - Power Flow Card
        - Climate Card
        - Alarm Panel Card
        - Advance Vacuum Card
        - Entity Card
        - Fav Card
        - Insignia Card
        - Person Card
        - Weather Card
        - Vacuum Card
        - Calendar Card
        - Notifications Card
        - Battery Card
        - Visual Editor
        - Translations
        - Styling / Theme
        - Mobile
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the problem?
      placeholder: Describe what is happening...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can I reproduce the issue?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: yaml
    attributes:
      label: Card configuration (YAML)
      description: Paste your card configuration here
      render: yaml

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
      description: If applicable, add screenshots or GIFs

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.4.2

  - type: input
    id: nodalia_version
    attributes:
      label: Nodalia Cards version
      placeholder: e.g. v0.6.1 / v1.0.0-alpha.x / latest

  - type: dropdown
    id: browser
    attributes:
      label: Browser / Device
      options:
        - Desktop (Chrome)
        - Desktop (Firefox)
        - Desktop (Safari)
        - Mobile (iOS)
        - Mobile (Android)
        - Home Assistant Companion App
        - Wall panel / tablet
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any extra info that might help
