name: 🐛 Bug report
description: Report a problem with Nodalia Cards
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug 🙌  
        Please fill out the information below to help me reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the problem?
      placeholder: Describe what is happening...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can I reproduce the issue?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: yaml
    attributes:
      label: Card configuration (YAML)
      description: Paste your card configuration here
      render: yaml

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos
      description: If applicable, add screenshots or GIFs

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.4.2

  - type: input
    id: nodalia_version
    attributes:
      label: Nodalia Cards version
      placeholder: e.g. latest / commit / version

  - type: dropdown
    id: browser
    attributes:
      label: Browser / Device
      options:
        - Desktop (Chrome)
        - Desktop (Firefox)
        - Desktop (Safari)
        - Mobile (iOS)
        - Mobile (Android)
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any extra info that might help
