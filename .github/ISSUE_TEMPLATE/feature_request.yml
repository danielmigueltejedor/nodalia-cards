name: ✨ Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["type: enhancement", "status: needs triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your idea! 🚀  
        Please describe it as clearly as possible.

  - type: dropdown
    id: affected_card
    attributes:
      label: Related card / area
      options:
        - Navigation Bar
        - Media Player
        - Light Card
        - Fan Card
        - Humidifier Card
        - Circular Gauge Card
        - Graph Card
        - Power Flow Card
        - Climate Card
        - Alarm Panel Card
        - Advance Vacuum Card
        - Entity Card
        - Fav Card
        - Insignia Card
        - Person Card
        - Weather Card
        - Vacuum Card
        - Calendar Card
        - Notifications Card
        - Battery Card
        - Visual Editor
        - Translations
        - Styling / Theme
        - Mobile
        - Performance
        - Security
        - Shared state / persistence
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      description: What problem does this solve?
      placeholder: This would help because...

  - type: textarea
    id: solution
    attributes:
      label: Possible solution
      description: How do you imagine it working?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
