name: 🌍 Translation correction
description: Report wrong or awkward wording in a non-Spanish UI language
title: "[Translation]: "
labels: ["type: translation", "area: translations", "status: needs triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this when **your Home Assistant UI language** is not Spanish and a label reads wrong, mixed, or unnatural.  
        Proposals are reviewed before being merged into the next release. Thank you for helping polish non-Spanish locales 🙌

  - type: dropdown
    id: ui_language
    attributes:
      label: UI language
      description: The language you see in Settings → Profile → Language, or the closest match.
      options:
        - German (de)
        - English (en)
        - French (fr)
        - Italian (it)
        - Dutch (nl)
        - Portuguese (pt)
        - Russian (ru)
        - Greek (el)
        - Chinese (zh)
        - Romanian (ro)
        - Other / not listed
    validations:
      required: true

  - type: dropdown
    id: affected_card
    attributes:
      label: Card / area
      options:
        - Navigation Bar
        - Media Player
        - Light Card
        - Fan Card
        - Humidifier Card
        - Circular Gauge Card
        - Graph Card
        - Power Flow Card
        - Climate Card
        - Alarm Panel Card
        - Advance Vacuum Card
        - Entity Card
        - Fav Card
        - Insignia Card
        - Person Card
        - Weather Card
        - Vacuum Card
        - Calendar Card
        - Notifications Card
        - Battery Card
        - Visual Editor
        - Whole bundle
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where did you see it?
      options:
        - Lovelace card editor (visual editor)
        - Card on the dashboard (runtime)
        - Both
        - Not sure
    validations:
      required: true

  - type: textarea
    id: wrong_text
    attributes:
      label: Current text
      description: Copy-paste the exact string as shown on screen.
      placeholder: Paste the label or sentence here...
    validations:
      required: true

  - type: textarea
    id: suggested_text
    attributes:
      label: Suggested correction
      description: What it should say instead.
      placeholder: Your proposed translation...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Section title nearby, button label next to it, or what you were doing.
      placeholder: e.g. Under “Styles” → color field for the dial...

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Drag an image here if it helps.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.4.2

  - type: input
    id: nodalia_version
    attributes:
      label: Nodalia Cards version
      placeholder: e.g. v0.6.1 / v1.0.0-alpha.x / latest

  - type: checkboxes
    id: consent
    attributes:
      label: Agreement
      options:
        - label: I understand this suggestion may be adjusted or declined for consistency with the rest of the UI.
          required: true
